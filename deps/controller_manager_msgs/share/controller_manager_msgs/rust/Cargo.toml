[package]
name = "controller_manager_msgs"
version = "5.2.0"
edition = "2021"

[dependencies]
rosidl_runtime_rs = "0.6"
serde = { version = "1", optional = true, features = ["derive"] }
serde-big-array = { version = "0.5.1", optional = true }

# ROS Dependencies
lifecycle_msgs = "*"
std_msgs = "*"
builtin_interfaces = "*"
service_msgs = "*"

[features]
serde = ['dep:serde', 'dep:serde-big-array', 'rosidl_runtime_rs/serde', 'lifecycle_msgs/serde', 'std_msgs/serde', 'builtin_interfaces/serde', 'service_msgs/serde']

[package.metadata.rclrs]
reexport = true
