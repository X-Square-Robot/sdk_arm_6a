[package]
name = "protocol"
version = "0.0.0"
edition = "2021"

[dependencies]
rosidl_runtime_rs = "0.6"
serde = { version = "1", optional = true, features = ["derive"] }
serde-big-array = { version = "0.5.1", optional = true }

# ROS Dependencies
std_srvs = "*"
builtin_interfaces = "*"
lifecycle_msgs = "*"
sensor_msgs = "*"
action_msgs = "*"
nav_msgs = "*"
geometry_msgs = "*"
service_msgs = "*"
tf2_msgs = "*"
std_msgs = "*"
controller_manager_msgs = "*"
x2robot_msgs = "*"
trajectory_msgs = "*"

[features]
serde = ['dep:serde', 'dep:serde-big-array', 'rosidl_runtime_rs/serde', 'std_srvs/serde', 'builtin_interfaces/serde', 'lifecycle_msgs/serde', 'sensor_msgs/serde', 'action_msgs/serde', 'nav_msgs/serde', 'geometry_msgs/serde', 'service_msgs/serde', 'tf2_msgs/serde', 'std_msgs/serde', 'controller_manager_msgs/serde', 'x2robot_msgs/serde', 'trajectory_msgs/serde']

[package.metadata.rclrs]
reexport = true
